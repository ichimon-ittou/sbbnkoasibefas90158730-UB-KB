<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>一問一答ドリル（社会・理科）</title>
<style>
  :root{--bg:#F3F5FB;--ink:#2A2F3A;--sub:#7A8398;--card:#FFFFFF;--line:#E6E9F2;
    --check:#E8A53C;--check-d:#B97C16;--check-bg:#FBF0DA;--ok:#2FA968;--ok-bg:#E4F5EC;--again:#E8745F;--again-bg:#FBE9E5;--shadow:0 10px 30px rgba(40,55,90,.10);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
  body{background:var(--bg);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","Hiragino Maru Gothic Pro","Yu Gothic","YuGothic","Hiragino Kaku Gothic ProN","Noto Sans JP","Meiryo",sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
  .app{width:100%;max-width:560px;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 40px;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:18px;font-weight:700;transition:transform .08s ease,filter .15s ease;}
  button:active{transform:scale(.97);}
  .hidden{display:none !important;}
  .head{text-align:center;margin:12px 0 20px;}
  .head .badge{display:inline-block;background:#fff;color:var(--sub);font-size:13px;font-weight:700;padding:6px 14px;border-radius:999px;box-shadow:var(--shadow);letter-spacing:.04em;}
  .head h1{font-size:24px;margin:14px 0 6px;line-height:1.3;}
  .head p{color:var(--sub);font-size:14px;margin:0;}
  .pick-label{font-size:14px;color:var(--sub);font-weight:700;margin:6px 4px 10px;}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .topbar .back{background:#fff;color:var(--sub);width:44px;height:44px;border-radius:14px;font-size:20px;box-shadow:var(--shadow);flex:0 0 auto;}
  .topbar .ttl{font-size:18px;font-weight:800;line-height:1.25;}
  .subjects{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .subject-card{background:var(--card);border-radius:24px;padding:30px 16px;text-align:center;box-shadow:var(--shadow);border:3px solid transparent;}
  .subject-card .ico{font-size:46px;line-height:1;}
  .subject-card .nm{font-size:22px;font-weight:800;margin-top:12px;}
  .subject-card .cnt{font-size:13px;color:var(--sub);margin-top:4px;}
  .subject-card.shakai .ico{color:#3AA0C9;} .subject-card.rika .ico{color:#5DA130;}
  .subject-card.inactive{opacity:.5;}
  .kai-list{display:flex;flex-direction:column;gap:12px;}
  .kai-card{background:var(--card);border-radius:20px;padding:18px 20px;text-align:left;box-shadow:var(--shadow);border-left:6px solid #5B6BC0;}
  .kai-card .kai-no{font-size:13px;font-weight:800;color:#5B6BC0;}
  .kai-card .kai-ttl{font-size:18px;font-weight:800;margin-top:2px;}
  .kai-card .cnt{font-size:12px;color:var(--sub);margin-top:3px;}
  .units{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .unit{background:var(--card);border-radius:20px;padding:18px 14px;text-align:left;box-shadow:var(--shadow);border-left:6px solid var(--line);display:flex;align-items:center;gap:12px;}
  .unit .ico{font-size:25px;line-height:1;flex:0 0 auto;}
  .unit .nm{font-size:15px;font-weight:800;line-height:1.25;}
  .unit .cnt{font-size:12px;color:var(--sub);margin-top:2px;}
  .unit.all{grid-column:1 / -1;justify-content:center;text-align:center;border-left:none;}
  .unit.all .nm{font-size:18px;}
  .check-card{width:100%;background:var(--check-bg);border:3px solid var(--check);border-radius:20px;padding:18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;text-align:left;margin-top:4px;}
  .check-card .ico{font-size:30px;flex:0 0 auto;}
  .check-card .ttl{font-size:18px;font-weight:800;color:var(--check-d);}
  .check-card .cnt{font-size:12px;color:var(--check-d);opacity:.85;margin-top:3px;}
  .check-card.inactive{opacity:.55;}
  .clear-btn{display:block;width:100%;background:transparent;color:var(--sub);font-size:14px;padding:10px;margin-top:2px;}
  .opt-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:18px;padding:14px 18px;margin-top:12px;box-shadow:var(--shadow);font-size:15px;font-weight:700;}
  .toggle{width:56px;height:32px;border-radius:999px;background:var(--line);position:relative;border:none;padding:0;flex:0 0 auto;}
  .toggle .knob{position:absolute;top:3px;left:3px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .15s ease;}
  .toggle.on{background:#5B6BC0;} .toggle.on .knob{left:27px;}
  .progress-wrap{flex:1;}
  .progress-top{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);font-weight:700;margin-bottom:6px;}
  .bar{height:10px;background:var(--line);border-radius:999px;overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;border-radius:999px;transition:width .3s ease;}
  .card{background:var(--card);border-radius:26px;box-shadow:var(--shadow);padding:22px;margin-bottom:16px;min-height:290px;display:flex;flex-direction:column;}
  .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .tag{font-size:13px;font-weight:800;padding:5px 14px;border-radius:999px;color:#fff;}
  .check{background:#fff;border:2px solid var(--line);color:var(--sub);padding:8px 14px;border-radius:999px;font-size:14px;display:flex;align-items:center;gap:6px;}
  .check.on{background:var(--check-bg);border-color:var(--check);color:var(--check-d);}
  .qfig{display:flex;justify-content:center;align-items:center;margin:14px 0 4px;background:#FAFBFE;border:1px solid var(--line);border-radius:16px;padding:10px;}
  .qfig svg{max-width:100%;height:auto;}
  .q-text{font-size:21px;font-weight:800;line-height:1.6;margin:16px 2px;flex:1;}
  .answer{background:var(--ok-bg);border-radius:18px;padding:18px;margin-top:4px;animation:pop .2s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .answer .lbl{font-size:13px;font-weight:800;color:var(--ok);margin-bottom:6px;}
  .answer .a-text{font-size:21px;font-weight:800;line-height:1.55;}
  .answer .a-expl{margin-top:12px;padding-top:12px;border-top:1px dashed rgba(47,169,104,.45);font-size:15px;font-weight:600;line-height:1.65;color:#3a4a55;}
  .subject-card.naoshi_ru .ico,.subject-card.naoshi_ya .ico{filter:none;}
  .reveal-btn{width:100%;padding:20px;font-size:19px;color:#fff;background:#5B6BC0;box-shadow:0 6px 16px rgba(91,107,192,.35);}
  .judge{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .judge button{padding:20px;font-size:19px;}
  .judge .again{background:var(--again-bg);color:var(--again);}
  .judge .ok{background:var(--ok);color:#fff;box-shadow:0 6px 16px rgba(47,169,104,.35);}
  .result{text-align:center;background:var(--card);border-radius:26px;box-shadow:var(--shadow);padding:34px 24px;}
  .result .face{font-size:60px;} .result h2{font-size:24px;margin:10px 0 4px;}
  .result .score{font-size:46px;font-weight:800;margin:14px 0 2px;}
  .result .score small{font-size:20px;color:var(--sub);font-weight:700;}
  .result .msg{color:var(--sub);font-size:15px;margin:8px 0 26px;line-height:1.6;}
  .result button{width:100%;padding:18px;font-size:17px;margin-top:12px;}
  .result .retry{background:var(--check);color:#fff;} .result .restart{background:#5B6BC0;color:#fff;}
  .result .home{background:#fff;color:var(--sub);box-shadow:var(--shadow);}

/* ===== アイテム機能 ===== */
.collrow{text-align:center;margin-top:12px;}
.coll-btn{background:linear-gradient(135deg,#5B6BC0,#8a63d2);color:#fff;border:none;border-radius:14px;padding:12px 22px;font-size:16px;font-weight:800;box-shadow:0 5px 14px rgba(91,107,192,.35);cursor:pointer;}
#packGet{margin:6px 0 4px;}
.packget-btn{width:100%;padding:18px;border:none;border-radius:16px;font-size:20px;font-weight:900;color:#5a3d00;background:linear-gradient(135deg,#ffe27a,#ffb43d);box-shadow:0 6px 18px rgba(255,160,40,.5);cursor:pointer;animation:pgpulse 1s infinite;}
.packget-btn small{display:block;font-size:12px;font-weight:700;margin-top:2px;color:#7a5a10;}
@keyframes pgpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
#repeatNote{font-size:13px;color:#7a8390;background:#f2f4f8;border-radius:12px;padding:10px;margin:6px 0;}
#mileNote{margin:6px 0;}
.mile{font-size:14px;font-weight:800;color:#8a5a00;background:#fff6e0;border:1px solid #ffcf7a;border-radius:12px;padding:8px 10px;margin:4px 0;}
#gachaOverlay{position:fixed;inset:0;background:rgba(20,22,40,.82);display:flex;align-items:center;justify-content:center;z-index:9999;}
#gachaOverlay.hidden{display:none;}
.gacha-inner{display:flex;flex-direction:column;align-items:center;gap:20px;}
.gpack{width:180px;height:180px;border-radius:24px;background:radial-gradient(circle at 50% 40%,#6a7bd8,#3a4aa0);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:70px;color:#fff;cursor:pointer;box-shadow:0 0 40px rgba(120,140,255,.6);animation:packfloat 1.4s ease-in-out infinite;}
.gpack .gpack-t{font-size:15px;font-weight:800;margin-top:6px;text-align:center;line-height:1.2;}
@keyframes packfloat{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}
.gcard{width:230px;padding:22px 16px;border-radius:20px;background:#fff;border:5px solid #9aa4b2;text-align:center;animation:cardpop .35s ease;box-shadow:0 10px 30px rgba(0,0,0,.4);}
@keyframes cardpop{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}
.gcard .gc-em{font-size:76px;line-height:1;}
.gcard .gc-nm{font-size:20px;font-weight:900;margin-top:8px;color:#2b3440;}
.gcard .gc-cat{font-size:12px;color:#8a94a2;margin-top:2px;}
.gcard .gc-r-lbl{font-size:14px;font-weight:900;letter-spacing:1px;margin-bottom:4px;}
.gcard .gc-new{display:inline-block;margin-top:8px;font-size:12px;font-weight:900;color:#fff;background:#ff4d6d;border-radius:10px;padding:2px 10px;}
.gcard.rN{border-color:#9aa4b2;} .gcard.rN .gc-r-lbl{color:#7a8390;}
.gcard.rR{border-color:#3d7bef;box-shadow:0 0 30px rgba(61,123,239,.6);} .gcard.rR .gc-r-lbl{color:#3d7bef;}
.gcard.rSR{border-color:#f0a500;box-shadow:0 0 40px rgba(240,165,0,.75);} .gcard.rSR .gc-r-lbl{color:#e09000;}
.gcard.rLG{border-image:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcB77,#4d96ff,#b14bff) 1;box-shadow:0 0 55px rgba(177,75,255,.85);} .gcard.rLG .gc-r-lbl{background:linear-gradient(90deg,#ff6b6b,#ffd93d,#4d96ff,#b14bff);-webkit-background-clip:text;background-clip:text;color:transparent;}
#gachaClose{padding:14px 40px;border:none;border-radius:14px;font-size:18px;font-weight:800;background:#fff;color:#3a4aa0;cursor:pointer;}
#gachaClose.hidden,.gcard.hidden,.gpack.hidden{display:none;}
.coll-prog{background:#eef1f6;border-radius:12px;padding:12px;margin:8px 12px;}
.coll-prog .cp-top{display:flex;justify-content:space-between;font-weight:800;color:#3a4a55;margin-bottom:6px;}
.coll-bar{height:12px;background:#dfe4ec;border-radius:8px;overflow:hidden;}
.coll-bar>div{height:100%;background:linear-gradient(90deg,#5B6BC0,#8a63d2);border-radius:8px;transition:width .4s;}
#collFilters{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 12px;}
#collFilters .chip{padding:7px 14px;border-radius:20px;border:1px solid #cfd6e0;background:#fff;font-weight:800;font-size:13px;cursor:pointer;color:#5a6470;}
#collFilters .chip.on{background:#5B6BC0;color:#fff;border-color:#5B6BC0;}
#collGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:6px 12px;}
.citem{position:relative;background:#fff;border:3px solid #e2e6ee;border-radius:14px;padding:12px 6px;text-align:center;min-height:104px;display:flex;flex-direction:column;justify-content:center;}
.citem .ci-em{font-size:40px;line-height:1;}
.citem .ci-nm{font-size:12px;font-weight:800;margin-top:6px;color:#2b3440;line-height:1.2;}
.citem .ci-r{font-size:10px;font-weight:900;margin-top:3px;color:#8a94a2;}
.citem.locked{background:#f3f5f9;border-color:#e6e9f0;}
.citem.locked .ci-em{filter:grayscale(1);opacity:.35;}
.citem.locked .ci-nm{color:#b7bfca;}
.citem .ci-new{position:absolute;top:-6px;right:-6px;background:#ff4d6d;color:#fff;font-size:10px;font-weight:900;border-radius:8px;padding:2px 6px;}
.citem.rN{border-color:#c2c9d4;} .citem.rR{border-color:#3d7bef;} .citem.rSR{border-color:#f0a500;}
.citem.rLG{border-image:linear-gradient(135deg,#ff6b6b,#ffd93d,#4d96ff,#b14bff) 1;}
.coll-sub{font-weight:900;color:#3a4a55;margin:14px 12px 6px;}
.troph-row{display:flex;flex-wrap:wrap;gap:8px;padding:0 12px 20px;}
.troph{background:#fff6e0;border:1px solid #ffcf7a;border-radius:12px;padding:8px 10px;font-size:22px;display:flex;align-items:center;gap:6px;}
.troph span{font-size:12px;font-weight:800;color:#8a5a00;}
.troph-empty{font-size:13px;color:#8a94a2;padding:0 12px 20px;}

  </style>
</head>
<body>
<div class="app">

  <section id="subjectScreen">
    <div class="head"><span class="badge">予習シリーズ 5年上</span><h1>一問一答ドリル</h1><p>科目を えらんでね</p></div>
    <div class="collrow"><button class="coll-btn" onclick="openCollection()">⚽ コレクション</button></div>
    <div class="subjects" id="subjectGrid"></div>
  </section>

  <section id="kaiScreen" class="hidden">
    <div class="topbar"><button class="back" onclick="buildSubjects()">←</button><div class="ttl" id="kaiTitle"></div></div>
    <div class="pick-label">回を えらぼう</div>
    <div class="kai-list" id="kaiGrid"></div>
  </section>

  <section id="unitScreen" class="hidden">
    <div class="topbar"><button class="back" onclick="buildKai()">←</button><div class="ttl" id="unitTitle"></div></div>
    <div class="pick-label">単元を えらぼう</div>
    <div class="units" id="unitGrid"></div>
    <button class="check-card" id="checkedCard" onclick="start('checked')"><div class="ico">🚩</div><div><div class="ttl">テスト前チェック</div><div class="cnt" id="cnt-checked"></div></div></button>
    <button class="clear-btn hidden" id="clearBtn" onclick="clearChecks()">この回の チェックを ぜんぶ けす</button>
    <div class="opt-row"><span>もんだいの じゅんばんを シャッフル</span><button id="shuffleToggle" class="toggle on" onclick="toggleShuffle()"><span class="knob"></span></button></div>
  </section>

  <section id="quizScreen" class="hidden">
    <div class="topbar"><button class="back" onclick="buildUnits()">←</button>
      <div class="progress-wrap"><div class="progress-top"><span id="qcount"></span><span id="okcount"></span></div><div class="bar"><i id="barFill"></i></div></div>
    </div>
    <div class="card">
      <div class="card-head"><span id="qtag" class="tag"></span><button id="checkBtn" class="check" onclick="toggleCheck()"><span>🚩</span><span id="checkLabel">チェック</span></button></div>
      <div id="qfig" class="qfig hidden"></div>
      <div class="q-text" id="qtext"></div>
      <div id="answerBox" class="answer hidden"><div class="lbl">こたえ</div><div class="a-text" id="atext"></div><div class="a-expl hidden" id="aexpl"></div></div>
    </div>
    <button id="revealBtn" class="reveal-btn" onclick="reveal()">こたえを 見る</button>
    <div id="judgeBox" class="judge hidden"><button class="again" onclick="mark(false)">もう いちど</button><button class="ok" onclick="mark(true)">できた！</button></div>
  </section>

  <section id="resultScreen" class="hidden">
    <div class="result"><div class="face" id="rFace">🎉</div><h2 id="rTitle"></h2><div class="score"><span id="rNum"></span><small> / <span id="rTotal"></span>もん</small></div><div class="msg" id="rMsg"></div>
      <div id="packGet" class="hidden"><button class="packget-btn" onclick="openPack()">⚽ パックGET！<small id="pgHint">ぜんもんノーミス クリア報酬！</small></button></div>
      <div id="repeatNote" class="hidden"></div>
      <div id="mileNote" class="hidden"></div>
      <button class="retry hidden" id="retryBtn" onclick="retryWrong()">まちがえた もんだいを もう一度</button>
      <button class="restart" onclick="restartSame()">もう一度 さいしょから</button>
      <button class="home" onclick="buildUnits()">単元えらびへ もどる</button>
    </div>
  </section>

  <section id="collectionScreen" class="hidden">
    <div class="topbar"><button class="back" onclick="collClose()">←</button><div class="ttl">⚽ コレクション</div></div>
    <div class="coll-prog"><div class="cp-top"><span>コレクション率</span><span><span id="collCnt"></span>　<span id="collPct"></span></span></div><div class="coll-bar"><div id="collBar"></div></div></div>
    <div id="collFilters">
      <button class="chip on" data-f="all" onclick="setCollFilter('all')">すべて</button>
      <button class="chip" data-f="N" onclick="setCollFilter('N')">N</button>
      <button class="chip" data-f="R" onclick="setCollFilter('R')">R</button>
      <button class="chip" data-f="SR" onclick="setCollFilter('SR')">SR</button>
      <button class="chip" data-f="LEGEND" onclick="setCollFilter('LEGEND')">LEGEND</button>
    </div>
    <div id="collGrid"></div>
    <div id="collTrophies"></div>
  </section>

</div>
<div id="gachaOverlay" class="hidden">
  <div class="gacha-inner">
    <div id="gachaPack" class="gpack" onclick="revealGacha()">⚽<div class="gpack-t">タップして<br>あける！</div></div>
    <div id="gachaCard" class="gcard hidden"></div>
    <button id="gachaClose" class="hidden" onclick="closeGacha()">とじる</button>
  </div>
</div>
<script>
const FIGS = {
  shiyakusho: `<svg viewBox="0 0 100 100" width="120" height="120"><circle cx="50" cy="50" r="34" fill="none" stroke="#2A2F3A" stroke-width="6"/><circle cx="50" cy="50" r="14" fill="none" stroke="#2A2F3A" stroke-width="6"/></svg>`,
  yubin: `<svg viewBox="0 0 100 100" width="120" height="120"><circle cx="50" cy="50" r="38" fill="none" stroke="#2A2F3A" stroke-width="6"/><text x="50" y="67" font-size="46" text-anchor="middle" fill="#2A2F3A" font-family="sans-serif" font-weight="bold">〒</text></svg>`,
  keisatsu: `<svg viewBox="0 0 100 100" width="120" height="120"><circle cx="50" cy="50" r="32" fill="none" stroke="#2A2F3A" stroke-width="6"/><line x1="34" y1="34" x2="66" y2="66" stroke="#2A2F3A" stroke-width="6" stroke-linecap="round"/><line x1="66" y1="34" x2="34" y2="66" stroke="#2A2F3A" stroke-width="6" stroke-linecap="round"/></svg>`,
  koban: `<svg viewBox="0 0 100 100" width="120" height="120"><line x1="28" y1="28" x2="72" y2="72" stroke="#2A2F3A" stroke-width="9" stroke-linecap="round"/><line x1="72" y1="28" x2="28" y2="72" stroke="#2A2F3A" stroke-width="9" stroke-linecap="round"/></svg>`,
  shogakko: `<svg viewBox="0 0 100 100" width="120" height="120"><text x="50" y="72" font-size="64" text-anchor="middle" fill="#2A2F3A" font-family="serif" font-weight="bold">文</text></svg>`,
  koukou: `<svg viewBox="0 0 100 100" width="120" height="120"><circle cx="50" cy="50" r="40" fill="none" stroke="#2A2F3A" stroke-width="5"/><text x="50" y="69" font-size="48" text-anchor="middle" fill="#2A2F3A" font-family="serif" font-weight="bold">文</text></svg>`,

    { id:"16", title:"語彙①（外来語）", units:{
  gairaigo:{ name:"外来語（用例→答え）", icon:"🔤", color:"#3AA0C9" },

    }, questions:[
  /* --- 16回 外来語（用例→答え） --- */
  {u:"gairaigo", q:"【用例】「会議の◯◯◯◯◯は大塚派に握られて、四谷派は苦しい立場になった」。意味は「主導権・先導」。この外来語は？", a:"イニシアチブ"},
  {u:"gairaigo", q:"【用例】「これからは情報をただ◯◯◯◯◯するのではなく、適切にアウトプットできる能力が問われるだろう」。意味は「入力（特にコンピューターで情報を記憶装置へ入れること）」。この外来語は？", a:"インプット"},
  {u:"gairaigo", q:"【用例】「技術的には確かにすぐれた作品だが、◯◯◯◯◯◯◯の点では疑問が残る」。意味は「独創性・創意」。この外来語は？", a:"オリジナリティ"},
  {u:"gairaigo", q:"【用例】「あの女優は◯◯◯◯◯◯としても人気が出そうだ」。意味は「性格・人格、その人の持ち味」。この外来語は？", a:"キャラクター"},
  {u:"gairaigo", q:"【用例】「アニメの◯◯◯◯◯◯グッズを集める」。意味は「小説・劇・映画などの登場人物」。この外来語は？", a:"キャラクター"},
  {u:"gairaigo", q:"【用例】「お客様からの◯◯◯◯に対応する」。意味は「苦情・異議」。この外来語は？", a:"クレーム"},
  {u:"gairaigo", q:"【用例】「移住した少数民族が独自の◯◯◯◯◯◯を形成する」。意味は「居住地域を同じくし、利害をともにする共同社会（地域社会）」。この外来語は？", a:"コミュニティ"},
  {u:"gairaigo", q:"【用例】「特にコンピューターで、データを画面に表示したり、印字などで取り出したりすること」。意味は「出力」。この外来語は？", a:"アウトプット"},
  {u:"gairaigo", q:"【用例】「サステイナブルな社会の実現を目指す」。意味は「持続可能であるさま」。この外来語は？", a:"サステイナブル"},
  {u:"gairaigo", q:"【用例】「この製品はハムスター用運動器具として高い◯◯◯を誇っています」。意味は「市場占有率」。この外来語は？（分ける・共有の意味）", a:"シェア"},
  {u:"gairaigo", q:"【用例】「姉は友人と部屋を◯◯◯して暮らしている」。意味は「共同でもつこと・共有」。この外来語は？", a:"シェア"},
  {u:"gairaigo", q:"【用例】「社会の◯◯◯◯に異議を唱える」。意味は「制度・組織・体系・系統」。この外来語は？", a:"システム"},
  {u:"gairaigo", q:"【用例】「わかりにくい登録◯◯◯◯を改善してほしい」。意味は「方法・方式」。この外来語は？", a:"システム"},
  {u:"gairaigo", q:"【用例】「西洋ではハトとオリーブは平和の◯◯◯◯とされる」。意味は「象徴・表象」。この外来語は？", a:"シンボル"},
  {u:"gairaigo", q:"【用例】「どちらにも味方しない◯◯◯◯を取っていたら双方から嫌われてしまった」。意味は「立場・態度」。この外来語は？", a:"スタンス"},
  {u:"gairaigo", q:"【用例】「◯◯◯◯で胃を悪くした」。意味は「いろいろな刺激や緊張で、心や体が不調になること」。この外来語は？", a:"ストレス"},
  {u:"gairaigo", q:"【用例】「平和の◯◯◯◯◯を掲げて瓦礫（がれき）の街を行進する人々」。意味は「団体や運動の主義・主張を、簡潔に言い表した語句・標語」。この外来語は？", a:"スローガン"},
  {u:"gairaigo", q:"【用例】「◯◯◯◯◯ディスタンス（社会的対人距離）」。意味は「社会的な・社交的な」。この外来語は？", a:"ソーシャル"},
  {u:"gairaigo", q:"【用例】「ダンサーの◯◯◯◯◯◯な動きに時間を忘れて引き込まれた」。意味は「力強く生き生きと躍動するさま」（⇔スタティック）。この外来語は？", a:"ダイナミック"},
  {u:"gairaigo", q:"【用例】「彼女は明るい◯◯◯の服装が多いね」。意味は「音・音調・色調・気分・調子」。この外来語は？", a:"トーン"},
  {u:"gairaigo", q:"【用例】「時代の◯◯◯◯を先取りする」。意味は「傾向・趨勢（ファッションの流行や経済変動の動向など）」。この外来語は？", a:"トレンド"},
  {u:"gairaigo", q:"【用例】「◯◯◯◯◯な立場で双方の意見を聞く」。意味は「中立的・中間的」。この外来語は？", a:"ニュートラル"},
  {u:"gairaigo", q:"【用例】「経営の◯◯◯◯を学ぶ」。意味は「ある専門的な技術やその蓄積のこと」。この外来語は？", a:"ノウハウ"},
  {u:"gairaigo", q:"【用例】「◯◯◯◯◯空間で会議する」。意味は「実体を伴わないさま・仮想的・疑似的」。この外来語は？", a:"バーチャル"},
  {u:"gairaigo", q:"【用例】「タレントが問題発言で◯◯◯◯◯にさらされる」。意味は「打ちのめすこと・手厳しく非難すること」。この外来語は？", a:"バッシング"},
  {u:"gairaigo", q:"【用例】「左足のシュートの正確さが彼の調子の◯◯◯◯◯◯と言えますね」。意味は「状態・程度・程度を推し量る基準となるもの・指標」。この外来語は？", a:"バロメーター"},
  {u:"gairaigo", q:"【用例】「将来の◯◯◯◯を描く」。意味は「将来の構想・展望・将来を見通す力・洞察力」。この外来語は？", a:"ビジョン"},
  {u:"gairaigo", q:"【用例】「兄は◯◯◯◯◯◯に弱くて、なかなか実力を発揮しきれない」。意味は「圧力・特に精神的圧迫」。この外来語は？", a:"プレッシャー"},
  {u:"gairaigo", q:"【用例】「生物の消化と排泄（はいせつ）の◯◯◯◯◯」。意味は「機械仕掛け・装置・機構・仕組み」。この外来語は？", a:"メカニズム"},
  {u:"gairaigo", q:"【用例】「◯◯◯◯に抽出した百人からアンケートをとる」。意味は「無作為・任意であること・そのさま」（⇔アト◯◯◯）。この外来語は？", a:"ランダム"},
  {u:"gairaigo", q:"【用例】「彼はすぐ人に◯◯◯◯を貼るので嫌がられている」。意味は「ある人物や物事についての断定的な評価」。この外来語は？", a:"レッテル"},
  {u:"gairaigo", q:"【用例】「◯◯◯◯線に乗ってのんびり旅をしたい」。意味は「地方の・地方特有の」。この外来語は？", a:"ローカル"},

    ]},
    { id:"17", title:"ことわざ", units:{
  kotowaza:{ name:"ことわざ（穴埋め）", icon:"🐟", color:"#5DA130" },

    }, questions:[
  /* --- 17回 ことわざ（意味＋穴埋め） --- */
  {u:"kotowaza", q:"警戒の厳しいことのたとえ。「◯◯の這い出る隙（すき）もない」の◯◯は？", a:"蟻（あり）"},
  {u:"kotowaza", q:"ほんのわずかな不注意や油断から大事が起こることのたとえ。「蟻（あり）の穴から◯◯も崩（くず）れる」の◯◯は？", a:"堤（つつみ）"},
  {u:"kotowaza", q:"わかりきった、当然すぎるほど当然なこと。「犬が西向きゃ尾（お）は◯◯」の◯◯は？", a:"東（ひがし）"},
  {u:"kotowaza", q:"何の役にも立たないもの。実物・本物でなければ値打ちもないこと。「絵に描（か）いた◯◯」の◯◯は？", a:"餅（もち）"},
  {u:"kotowaza", q:"一見関係がないようでも実は同類・仲間であることのたとえ（多くは悪事を働く者について）。「同じ穴の◯◯◯」の◯◯◯は？", a:"狢（むじな）"},
  {u:"kotowaza", q:"何かをしようという気持ちになったら、その日が吉日と思ってすぐに始めるのがよい。「思い立ったが◯◯」の◯◯は？", a:"吉日（きちじつ）"},
  {u:"kotowaza", q:"親の社会的地位や名声が高いと、子はそのおかげを受けることが大きいということ。「親の光りは◯◯◯」の◯◯◯は？", a:"七光り（ななひかり）"},
  {u:"kotowaza", q:"何事も強い者や最終的に勝ったものが正義とされることのたとえ。「勝てば官軍、負ければ◯◯」の◯◯は？", a:"賊軍（ぞくぐん）"},
  {u:"kotowaza", q:"知らないことは積極的に質問するべきだという教え。「聞くは一時（いっとき）の恥、聞かぬは◯◯の恥」の◯◯は？", a:"一生（いっしょう）"},
  {u:"kotowaza", q:"一度や二度は当てにならないが、三度目は確実であるということ。物事は三度目には期待どおりになるということ。「三度目の◯◯」の◯◯は？", a:"正直（しょうじき）"},
  {u:"kotowaza", q:"凡人でも三人集まって相談すれば、すばらしい知恵が出るものだということ。「三人寄れば◯◯の知恵（ちえ）」の◯◯は？", a:"文殊（もんじゅ）"},
  {u:"kotowaza", q:"失敗すればその原因を反省し、方法や欠点を改めるので、かえってその後の成功につながるということ。「失敗は◯◯のもと」の◯◯は？", a:"成功（せいこう）"},
  {u:"kotowaza", q:"同類のすることは、その方面の者にはすぐわかるということ。「◯◯（じゃ）の道は◯◯（へび）」の後ろの◯◯は？", a:"蛇（へび）"},
  {u:"kotowaza", q:"自分を見放す人もいれば助けてくれる人もいる、くよくよするなということ。「捨てる神あれば◯◯神あり」の◯◯は？", a:"拾う（ひろう）"},
  {u:"kotowaza", q:"どんな大事業も手近なところから始まることのたとえ。「千里（せんり）の道も◯◯から」の◯◯は？", a:"一歩（いっぽ）"},
  {u:"kotowaza", q:"初めは損をしても、それをもとに大きな利益を得るようにせよ。「損して◯取れ」の◯は？", a:"得（とく）"},
  {u:"kotowaza", q:"自分には関係がなく、なんの苦痛もないこと。「対岸（たいがん）の◯◯」の◯◯は？", a:"火事（かじ）"},
  {u:"kotowaza", q:"事前の騒ぎばかりが大きくて、実際の結果が小さいこと。「大山鳴動（たいざんめいどう）して◯◯一匹」の◯◯は？", a:"鼠（ねずみ）"},
  {u:"kotowaza", q:"理屈ばかりで実地の訓練が欠けていて、実際には役に立たないこと。「畳（たたみ）の上の◯◯」の◯◯は？", a:"水練（すいれん）"},
  {u:"kotowaza", q:"旅先では知人もなく、普段しないような恥ずかしい言動も平気でしてしまうこと。「旅の◯はかきすて」の◯は？", a:"恥（はじ）"},
  {u:"kotowaza", q:"小さな欠点を直そうとして、かえって全体をだめにしてしまうたとえ。「角（つの）を矯（た）めて◯を殺す」の◯は？", a:"牛（うし）"},
  {u:"kotowaza", q:"精神が柔軟で吸収する力のある若いうちに鍛えるべきだということ。「◯は熱いうちに打て」の◯は？", a:"鉄（てつ）"},
  {u:"kotowaza", q:"土地が違えば、風俗・習慣なども違うということ。「所変われば◯変わる」の◯は？", a:"品（しな）"},
  {u:"kotowaza", q:"何でも他人のものはよく見えるものであるということ。「となりの◯◯は青い」の◯◯は？", a:"芝生（しばふ）"},
  {u:"kotowaza", q:"他の権勢に頼って威張る小人（しょうじん）のたとえ。「虎（とら）の威（い）を借る◯」の◯は？", a:"狐（きつね）"},
  {u:"kotowaza", q:"つまらない所に、そこに似合わぬすぐれたものや美しいものがあることのたとえ。「掃き溜（だ）めに◯」の◯は？", a:"鶴（つる）"},

  naoshi_ru:{ label:"週テスト直し（RU）", kai:[
    { id:"16", title:"16回 週テスト直し", units:{ kokugo:{ name:"国語", icon:"📖", color:"#E0699A" }, rika:{ name:"理科", icon:"🔬", color:"#16A398" }, shakai:{ name:"社会", icon:"🌏", color:"#5B6BC0" } }, questions:[
      {"u": "kokugo", "q": "「四谷監督は練習がキビシイことで有名だ。」の――のカタカナを漢字にすると？", "a": "厳しい", "e": "「きびしい」。少しの手ぬきも許さない様子。"},
      {"u": "kokugo", "q": "「日本では国民がシュケンを持っている。」の――のカタカナを漢字にすると？", "a": "主権", "e": "「しゅけん」。国の政治のあり方を最終的に決める力。"},
      {"u": "kokugo", "q": "「駅で夜行バスのジョウシャケンを買った。」の――のカタカナを漢字にすると？", "a": "乗車券", "e": "「じょうしゃけん」。電車やバスに乗る切符。"},
      {"u": "kokugo", "q": "「なめらかな手ざわりのキヌイト。」の――のカタカナを漢字にすると？", "a": "絹糸", "e": "「きぬいと」。蚕（かいこ）のまゆからとった糸。"},
      {"u": "kokugo", "q": "「この一週間は気温の変化がハゲシイ。」の――のカタカナを漢字にすると？", "a": "激しい", "e": "「はげしい」。程度が非常に強い。"},
      {"u": "kokugo", "q": "「ケイアイする作家の本を読む。」の――のカタカナを漢字にすると？", "a": "敬愛", "e": "「けいあい」。うやまい親しむこと。"},
      {"u": "kokugo", "q": "「シェイクスピアのヒゲキを読む。」の――のカタカナを漢字にすると？", "a": "悲劇", "e": "「ひげき」。悲しい結末の劇・できごと。"},
      {"u": "kokugo", "q": "「自動車会社にツトメル。」の――のカタカナを漢字にすると？", "a": "勤める", "e": "「つとめる」。会社などで働く。※務める・努めると区別。"},
      {"u": "kokugo", "q": "「王様のケイゴをする。」の――のカタカナを漢字にすると？", "a": "警護", "e": "「けいご」。危険がないよう守ること。※敬語と区別。"},
      {"u": "rika", "q": "固体を加熱して気体を発生させると、試験管の口に水（水てき）がつくことがある。試験管の口をどうしておくとよい？また、その理由は？", "a": "口を少し下げる（ななめ下向きにする）／流れた水が加熱部分に行くと、急に冷えて試験管が割れるから"},
      {"u": "rika", "q": "水と置きかえて気体を集める「水上置換法」で、気体を集める集気びんの中には、あらかじめ何を入れておく？", "a": "水（いっぱいに満たしておく）", "e": "水にとけにくい気体を集める方法。"},
      {"u": "rika", "q": "次の気体を集める方法は？(1)塩化水素〔空気より重く水にとけやすい〕(2)水素〔水にとけにくい〕(3)アンモニア〔空気より軽く水にとけやすい〕", "a": "(1)下方置換法 (2)水上置換法 (3)上方置換法"},
      {"u": "rika", "q": "アルミニウムにうすい塩酸を加えると発生する気体は？また、塩酸のかわりに使える水よう液は？", "a": "水素／水酸化ナトリウム水よう液"},
      {"u": "rika", "q": "(1)二酸化炭素を発生させるには、どんな固体に何を加える？(2)酸素を発生させるには、どんな固体に何を加える？", "a": "(1)石灰石（炭酸カルシウム）にうすい塩酸 (2)二酸化マンガンにうすい過酸化水素水（オキシドール）"},
      {"u": "rika", "q": "二酸化マンガンは、過酸化水素水を分解して酸素を発生させるが、自分自身は変化しない。このようなはたらきをする物質を何という？", "a": "触媒（しょくばい）"},
      {"u": "rika", "q": "石灰石にうすい塩酸を加えて二酸化炭素を発生させたところ、石灰石はまだ残っているのに気体が出なくなった。その理由は？", "a": "塩酸が使い切られて足りなくなったから", "e": "もう一度発生させるには塩酸を加える。"},
      {"u": "rika", "q": "酸素の性質について、(1)空気とくらべた重さ (2)水へのとけ方 (3)ものを燃やすはたらき は？", "a": "(1)空気より少し重い (2)水にとけにくい (3)自分は燃えないが、ものが燃えるのを助ける（助燃性）"},
      {"u": "rika", "q": "都市ガスの主成分で、炭素と水素だけからでき、地球温暖化の原因となる温室効果ガスの一つでもある気体は？", "a": "メタン"},
      {"u": "rika", "q": "丸底フラスコにアンモニアを集め、スポイトで少量の水を入れると、ビーカーの水が吸い上げられて噴水になる。(1)水が吸い上げられる理由は？(2)フェノールフタレイン液を加えた水は何色になる？", "a": "(1)アンモニアが水に大量にとけてフラスコ内の気体が減り、気圧が下がるから (2)赤色（アルカリ性）"},
      {"u": "rika", "q": "月の自転と公転の向きは、北極側から見てどちら回り？", "a": "どちらも反時計回り"},
      {"u": "rika", "q": "夕方に東の空からのぼり、真夜中に南の空を通り、明け方に西の空へしずんでいく月は、どんな形（満ち欠け）の月？", "a": "満月"},
      {"u": "rika", "q": "ある日、月の出が午後11時35分、次の日の月の入りが午前11時38分だった。この月が空に出ていた時間は？", "a": "12時間3分"},
      {"u": "rika", "q": "太陽・地球・月がこの順に一直線にならび、月が地球のかげに入って起こる現象を何という？また満月・新月どちらのとき起こる？", "a": "月食／満月のとき", "e": "月は東側から欠け始める。"},
      {"u": "shakai", "q": "神奈川県にあり、東京湾の入り口に面し、先に三崎港がある半島を何という？", "a": "三浦半島"},
      {"u": "shakai", "q": "千葉県の東京湾岸に残る、貴重な干潟を2つ答えると？", "a": "三番瀬・谷津干潟", "e": "（茨城県の霞ヶ浦は東京湾ではない）"},
      {"u": "shakai", "q": "横浜市にあり、東京の都心の働きの一部を受け持つために開発された地区「みなとみらい21」。このように、都心の機能を分担する地区を何という？", "a": "副都心"},
      {"u": "shakai", "q": "東京湾岸に石油化学コンビナートや製鉄所が集まり、機械工業もさかんな、日本有数の工業地帯を何という？", "a": "京浜工業地帯", "e": "川崎市・横浜市などが中心。", "f": "chart_keihin"},
      {"u": "shakai", "q": "群馬・栃木・茨城などの内陸に広がり、高速道路ぞいに電気機械などの工場が進出した工業地域を何という？", "a": "関東内陸工業地域", "f": "chart_nairiku"},
      {"u": "shakai", "q": "横浜港の輸入品で、金額が最も多いもの（2023年）は？", "a": "液化ガス"},
      {"u": "shakai", "q": "みなとみらい21がある、神奈川県の貿易港を漢字で答えると？", "a": "横浜（港）"},
      {"u": "shakai", "q": "こんにゃくいもの生産量が全国の9割以上をしめる下仁田町があるのは何県？", "a": "群馬県"},
      {"u": "shakai", "q": "群馬県の県庁所在地で、利根川の上流が流れる都市はどこ？", "a": "前橋市"},
      {"u": "shakai", "q": "大都市で、都心の人口が減り、周りの郊外の人口が増えていく現象を何という？", "a": "ドーナツ化現象"},
      {"u": "shakai", "q": "長野県の八ヶ岳のふもとの野辺山原などで、夏のすずしさを生かして作られる高原野菜は？", "a": "レタス（高原野菜）"},
      {"u": "shakai", "q": "新潟・富山・長野・岐阜県に広がる、日本アルプスの一つの山脈を何という？", "a": "飛驒山脈"},
      {"u": "shakai", "q": "静岡県に広がる工業地域を何という？また、静岡県を流れる川を東から順に2つ？", "a": "東海工業地域／天竜川・大井川"},
      {"u": "shakai", "q": "中部地方の政令指定都市は、名古屋・新潟・静岡・浜松の4つ。このうち、1つの県に2つある県はどこ？", "a": "静岡県（静岡市と浜松市）"}
    ]},
    { id:"17", title:"17回 週テスト直し", units:{ kokugo:{ name:"国語", icon:"📖", color:"#E0699A" }, rika:{ name:"理科", icon:"🔬", color:"#16A398" }, shakai:{ name:"社会", icon:"🌏", color:"#5B6BC0" } }, questions:[
      {"u": "kokugo", "q": "「コウゴウ陛下が被災地を訪問する。」の――のカタカナを漢字にすると？", "a": "皇后", "e": "「こうごう」。天皇のきさき。"},
      {"u": "kokugo", "q": "「山間部では雪がたくさんフル。」の――のカタカナを漢字にすると？", "a": "降る", "e": "「ふる」。雨や雪が落ちる。※振ると区別。"},
      {"u": "kokugo", "q": "「建物のコッカクができあがる。」の――のカタカナを漢字にすると？", "a": "骨格", "e": "「こっかく」。ほねぐみ。"},
      {"u": "kokugo", "q": "「日本有数のコクソウ地帯。」の――のカタカナを漢字にすると？", "a": "穀倉", "e": "「こくそう」。穀物が多くとれる地域。"},
      {"u": "kokugo", "q": "「親コウコウな子。」の――のカタカナを漢字にすると？", "a": "孝行", "e": "「こうこう」。親を大切にすること。"},
      {"u": "kokugo", "q": "「テンノウ陛下のお言葉。」の――のカタカナを漢字にすると？", "a": "天皇", "e": "「てんのう」。"},
      {"u": "kokugo", "q": "「監督は練習がキビシイ。」の――のカタカナを漢字にすると？", "a": "厳しい", "e": "「きびしい」。"},
      {"u": "kokugo", "q": "「ジョウシャケンを買う。」の――のカタカナを漢字にすると？", "a": "乗車券", "e": "「じょうしゃけん」。"},
      {"u": "kokugo", "q": "「日本国ケンポウを学ぶ。」の――のカタカナを漢字にすると？", "a": "憲法", "e": "「けんぽう」。国の最高のきまり。"},
      {"u": "kokugo", "q": "「対岸の◯◯」は「自分には関係がなく、少しも困らないこと」。◯◯に入る言葉は？", "a": "火事", "e": "向こう岸の火事は自分に害がない、の意味。"},
      {"u": "kokugo", "q": "「虎（とら）の威（い）を借（か）る◯◯」の意味は？また◯◯は？", "a": "きつね／意味：強い者の力をたよりにいばる、力のない者のたとえ"},
      {"u": "rika", "q": "オキシドール（過酸化水素水）に、ある固体を加えると酸素が発生する。この固体は？", "a": "二酸化マンガン"},
      {"u": "rika", "q": "過酸化水素水に加える二酸化マンガンの量を2倍・3倍にふやすと、発生する酸素の合計の量はどうなる？", "a": "変わらない", "e": "二酸化マンガンは触媒。酸素の量は過酸化水素水の量で決まる。"},
      {"u": "rika", "q": "反応を速めるが、それ自体は変化しない物質を何という？（例：過酸化水素水を分解する二酸化マンガン）", "a": "触媒"},
      {"u": "rika", "q": "うすい塩酸100cm³は、炭酸カルシウム5gと過不足なく反応し、二酸化炭素を1200cm³発生させる。炭酸カルシウムを5.4g（塩酸より多め）にして同じ塩酸100cm³を加えると、二酸化炭素は何cm³発生する？", "a": "1200cm³", "e": "少ない方（塩酸）の量で決まる。", "f": "r17_co2"},
      {"u": "rika", "q": "アルミニウム0.3gにうすい塩酸を十分に加えると、水素が400cm³発生する。ある実験で水素が600cm³発生した。使ったアルミニウムは何g？", "a": "0.45g", "e": "0.3×600÷400＝0.45g。"},
      {"u": "rika", "q": "ある塩酸を24cm³加えると水素が600cm³発生した。同じ塩酸で水素を400cm³発生させるには、塩酸は何cm³必要？（アルミニウムは十分ある）", "a": "16cm³", "e": "24×400÷600＝16cm³。"},
      {"u": "rika", "q": "同じ量の水素（400cm³）を発生させるのに、塩酸Aは16cm³、塩酸Bは12cm³必要だった。塩酸Aの濃さは塩酸Bの何倍？", "a": "0.75倍", "e": "量が少ないほど濃い。12÷16＝0.75。"},
      {"u": "rika", "q": "空気より軽く、水にとてもよくとけるアンモニアを集める方法は？", "a": "上方置換法"},
      {"u": "rika", "q": "(1)においがなく、水にとけにくく、空気より軽い気体は？(2)鼻をさすにおいがあり、水によくとけ、空気より軽い気体は？", "a": "(1)水素 (2)アンモニア"},
      {"u": "rika", "q": "固体を加熱して気体を発生させるとき、試験管の口を少し下げておくのはなぜ？", "a": "発生した水（水てき）が加熱部分に流れて試験管が割れるのを防ぐため"},
      {"u": "shakai", "q": "青森県にある、まさかりのような形の半島を何という？", "a": "下北半島"},
      {"u": "shakai", "q": "福島県にあり、近くの都市で会津塗がつくられる、日本で4番目に大きい湖は？", "a": "猪苗代湖"},
      {"u": "shakai", "q": "三陸海岸の沖が、多くの種類の魚が集まるよい漁場になっているのはなぜ？", "a": "暖流と寒流がぶつかる潮目（潮境）ができるから"},
      {"u": "shakai", "q": "秋田県の日本海側に広がる、米づくりがさかんな平野を何という？", "a": "庄内平野"},
      {"u": "shakai", "q": "東北地方の太平洋側で、初夏に「やませ」がふくと、農作物にどんな害が起こる？", "a": "冷害（気温が上がらず、米などが実らない）", "e": "やませ＝冷たい北東風。"},
      {"u": "shakai", "q": "青森県と秋田県にまたがり、ぶなの原生林が広がる世界自然遺産を何という？", "a": "白神山地"},
      {"u": "shakai", "q": "北海道の内陸にある旭川市の気候の特ちょうは？", "a": "夏と冬の気温差が大きい（内陸の気候）"},
      {"u": "shakai", "q": "旭川市や帯広市を流れ、流域面積が日本で2番目に大きい川は？", "a": "石狩川"},
      {"u": "shakai", "q": "北海道南東部にあり、じゃがいも・てんさい・小麦などをつくり、輪作がさかんな平野は？", "a": "十勝平野", "e": "輪作＝作物を年ごとに変える。"},
      {"u": "shakai", "q": "水鳥がすむ大切な湿地を守る国際条約を何という？（北海道の釧路湿原などが登録）", "a": "ラムサール条約"},
      {"u": "shakai", "q": "北方領土のうち、知床半島に最も近い島は？", "a": "国後島", "e": "北方領土＝択捉島・国後島・色丹島・歯舞群島。"},
      {"u": "shakai", "q": "関東地方で、県庁所在地ではないのに人口100万人をこえる政令指定都市は？", "a": "川崎市"},
      {"u": "shakai", "q": "東京都には、海面より土地が低い「◯◯◯◯◯地帯」がある。◯に入る言葉は？", "a": "ゼロメートル地帯"},
      {"u": "shakai", "q": "群馬県で自動車工業がさかんな都市は？", "a": "太田市"},
      {"u": "shakai", "q": "東京から新潟へ向かう新幹線を何という？", "a": "上越新幹線"}
    ]},
    { id:"18", title:"18回 週テスト直し", units:{ kokugo:{ name:"国語", icon:"📖", color:"#E0699A" }, rika:{ name:"理科", icon:"🔬", color:"#16A398" }, shakai:{ name:"社会", icon:"🌏", color:"#5B6BC0" } }, questions:[
      {"u": "kokugo", "q": "「たつ」を漢字で書くと？", "a": "裁つ", "e": "布を型どおり切る。※断つ・絶つと区別。"},
      {"u": "kokugo", "q": "「ドシャ」を漢字で書くと？", "a": "土砂", "e": "土と砂。"},
      {"u": "kokugo", "q": "「ザダンカイ」を漢字で書くと？", "a": "座談会", "e": "集まって話し合う会。"},
      {"u": "kokugo", "q": "「ヒッシ」を漢字で書くと？", "a": "必至", "e": "必ずそうなること。※必死と区別。"},
      {"u": "kokugo", "q": "「ヨウサン」を漢字で書くと？", "a": "養蚕", "e": "蚕を飼いまゆをとること。"},
      {"u": "kokugo", "q": "「コクソウ」を漢字で書くと？", "a": "穀倉", "e": "穀物が多くとれる地域。"},
      {"u": "kokugo", "q": "「ふる」を漢字で書くと？", "a": "降る", "e": "雨や雪が落ちる。※振ると区別。"},
      {"u": "kokugo", "q": "「テンノウ」を漢字で書くと？", "a": "天皇"},
      {"u": "kokugo", "q": "「単純」の反対の意味の言葉（対義語）は？", "a": "複雑", "e": "入り組んでいること。"},
      {"u": "kokugo", "q": "「異常」の対義語は？", "a": "正常", "e": "ふつうの状態。"},
      {"u": "kokugo", "q": "「時間」の対義語は？", "a": "空間"},
      {"u": "kokugo", "q": "「食べる」を、相手を高めて言う（尊敬語）と？", "a": "めしあがる"},
      {"u": "kokugo", "q": "「行く・来る」を、へりくだって言う（謙譲語）と？", "a": "まいる"},
      {"u": "rika", "q": "植物の葉の表面にあって、蒸散のときに水蒸気が出ていく小さな穴を何という？また、その穴は葉の表側・裏側のどちらに多い？", "a": "気孔（きこう）／裏側に多い", "e": "気孔が多い裏側ほど蒸散がさかん。"},
      {"u": "rika", "q": "植物の枝を4本用意し、葉やくきにワセリンをぬる（ぬった所は蒸散しない）実験をした。一定時間の水の減り方は、A（どこにもぬらない）=32mm、B（葉のうらにぬる）=12mm、C（葉の表にぬる）=24mm、D（葉の表と裏の両方にぬる）=4mm。葉の表から蒸散した量は何mm？", "a": "8mm", "e": "A−C＝32−24＝8mm。"},
      {"u": "rika", "q": "植物の枝を4本用意し、葉やくきにワセリンをぬる（ぬった所は蒸散しない）実験をした。一定時間の水の減り方は、A（どこにもぬらない）=32mm、B（葉のうらにぬる）=12mm、C（葉の表にぬる）=24mm、D（葉の表と裏の両方にぬる）=4mm。葉のうらから蒸散した量は何mm？", "a": "20mm", "e": "A−B＝32−12＝20mm。"},
      {"u": "rika", "q": "植物の枝を4本用意し、葉やくきにワセリンをぬる（ぬった所は蒸散しない）実験をした。一定時間の水の減り方は、A（どこにもぬらない）=32mm、B（葉のうらにぬる）=12mm、C（葉の表にぬる）=24mm、D（葉の表と裏の両方にぬる）=4mm。くきから蒸散した量は何mm？", "a": "4mm", "e": "Dより、くきだけの蒸散量は4mm。"},
      {"u": "rika", "q": "二酸化炭素があるかどうかを調べる液体は？また、二酸化炭素を通すとどうなる？", "a": "石灰水／白くにごる"},
      {"u": "rika", "q": "植物は、光を受けて水と気体Aからデンプンと気体Bをつくる。この「光合成」で、取り入れる気体Aと、出す気体Bは？", "a": "A＝二酸化炭素／B＝酸素"},
      {"u": "rika", "q": "植物は光を受けているとき、光合成で二酸化炭素を吸収しながら、同時に呼吸で二酸化炭素を出している。見かけ上は二酸化炭素を「8」吸収しているように見え、呼吸では「2」を出しているとき、実際に光合成で使った二酸化炭素の量はいくつ？", "a": "10（見かけの吸収8＋呼吸で出した2）", "e": "実際の光合成量＝見かけの吸収量＋呼吸で出した量。"},
      {"u": "rika", "q": "炭酸カルシウム（石灰石）にうすい塩酸を加えると発生する気体は？", "a": "二酸化炭素"},
      {"u": "rika", "q": "二酸化炭素を発生させるのに使う「固体」と「液体」の組み合わせは？", "a": "固体＝炭酸カルシウム／液体＝うすい塩酸"},
      {"u": "rika", "q": "炭酸カルシウムに塩酸を少しずつ加えると二酸化炭素がふえるが、ある量からは、いくら塩酸を加えても二酸化炭素がふえなくなった。この「ふえなくなった時」の炭酸カルシウムと塩酸の関係を何という？", "a": "過不足なく反応した（ちょうど反応しきった）"},
      {"u": "rika", "q": "炭酸カルシウムと塩酸がちょうど反応するとき、塩酸50cm³で二酸化炭素が1200cm³発生する。塩酸のわりに炭酸カルシウムを多めにして、同じ塩酸をさらにふやせないとき、発生する二酸化炭素は最大何cm³？", "a": "1200cm³", "e": "塩酸の量で決まる。"},
      {"u": "rika", "q": "ある塩酸50cm³は二酸化炭素を1200cm³発生させる。塩酸を1.6倍（80cm³）にして、炭酸カルシウムも十分あるとき、発生する二酸化炭素は何cm³？", "a": "1920cm³", "e": "1200×1.6＝1920cm³。"},
      {"u": "shakai", "q": "次の地図記号は、何を表す？", "a": "消防署", "f": "shoubou"},
      {"u": "shakai", "q": "東京に特に多く集まり、全国から情報が集まりやすい産業（本や雑誌を作る会社）は？", "a": "出版社（出版業）"},
      {"u": "shakai", "q": "兵庫県にあり、ポートアイランドという人工島がある、貿易のさかんな都市は？", "a": "神戸市"},
      {"u": "shakai", "q": "近畿地方で最も人口が多い都市は？", "a": "大阪市"},
      {"u": "shakai", "q": "千葉県で、石油化学コンビナートがある都市は？", "a": "市原市", "e": "野田市＝しょうゆ、君津市＝製鉄所。"},
      {"u": "shakai", "q": "東京と新潟を結ぶ新幹線を何という？", "a": "上越新幹線"},
      {"u": "shakai", "q": "北海道の、昔の呼び名は何？", "a": "えぞ（蝦夷）"},
      {"u": "shakai", "q": "秋田県にある半島を何という？", "a": "男鹿半島", "e": "牡鹿半島＝宮城県、下北半島＝青森県。"},
      {"u": "shakai", "q": "北海道東部の根釧台地でさかんな農業は？また、北海道で米づくりがさかんな地域は？", "a": "酪農／石狩平野・上川盆地"}
    ]},
    { id:"19", title:"19回 週テスト直し", units:{ kokugo:{ name:"国語", icon:"📖", color:"#E0699A" }, rika:{ name:"理科", icon:"🔬", color:"#16A398" }, shakai:{ name:"社会", icon:"🌏", color:"#5B6BC0" } }, questions:[
      {"u": "kokugo", "q": "「ヨウサン」を漢字で書くと？", "a": "養蚕", "e": "蚕を飼いまゆをとること。"},
      {"u": "kokugo", "q": "「サッシ」を漢字で書くと？", "a": "冊子", "e": "うすい本。"},
      {"u": "kokugo", "q": "「会う」を、へりくだって言う（謙譲語）と？", "a": "おめにかかる"},
      {"u": "rika", "q": "人類を、あらわれた古い順に4つならべると？", "a": "猿人 → 原人 → 旧人 → 新人"},
      {"u": "rika", "q": "図は、北極側から見た地球と、地表の地点A・B・C・Dを示す。地点Aの矢印が「北」を指すとき、地点Cの矢印が指す方位は？", "a": "東", "e": "どこでも北極の方向が「北」。", "f": "r19_daynight"},
      {"u": "rika", "q": "地球の自転で、これから太陽の光が当たらなくなる（太陽が西に見える）地点は、1日のうちのいつ？", "a": "日の入り（夕方）"},
      {"u": "rika", "q": "地球は24時間で360度自転する。経度が15度ちがうと時差は1時間。経度差が225度ある2地点の時差は何時間？", "a": "15時間", "e": "225÷15＝15時間。"},
      {"u": "rika", "q": "日本の東側の海底にあり、日本の下にしずみこんでいる海洋プレートの名前は？", "a": "太平洋プレート", "f": "r19_naibu"},
      {"u": "rika", "q": "蒸散の実験で、水の減り方が、何もぬらない枝＝31.9mm、葉の表と裏にぬった枝（くきだけ蒸散）＝11.1mm だった。葉全体から蒸散した量は何mm？", "a": "20.8mm", "e": "31.9−11.1＝20.8mm。"},
      {"u": "shakai", "q": "日本最大の湖である琵琶湖がある県はどこ？", "a": "滋賀県"},
      {"u": "shakai", "q": "群馬県で、県庁所在地の前橋市よりも人口が多い、新幹線の駅がある都市は？", "a": "高崎市"},
      {"u": "shakai", "q": "神戸市や姫路市があり、近畿地方の日本海側から瀬戸内海までひろがる県はどこ？", "a": "兵庫県"},
      {"u": "shakai", "q": "ある地域の混み具合を表す「人口密度」は、どうやって求める？", "a": "人口を面積で割る（1km²あたりの人口）"},
      {"u": "shakai", "q": "2011年の原子力発電所の事故のあと、活用がすすんだ、太陽光・風力・地熱などのエネルギーをまとめて何という？", "a": "再生可能エネルギー", "f": "s19_denryoku"},
      {"u": "shakai", "q": "雪が多く冬に農作業ができない北陸地方で、農家の副業として発達した、昔ながらの技術による工業を何という？", "a": "地場産業（伝統工業）"},
      {"u": "shakai", "q": "日本は、石油・石炭・天然ガスなどのエネルギー資源の大部分を、どのようにして手に入れている？", "a": "外国からの輸入", "e": "国内でとれる量はごくわずかで、自給率は低い。"},
      {"u": "shakai", "q": "ある地域で、家畜を飼う農家の戸数は減ったが、飼われている家畜の合計数はほとんど変わらなかった。農家1戸あたりの飼育頭数はどうなる？", "a": "増える", "e": "戸数が減って合計が同じなら、1戸あたりは増える。"},
      {"u": "shakai", "q": "都道府県庁がある都市ではないのに、政令指定都市になっている都市の例を1つ挙げると？", "a": "川崎市", "e": "（横浜・さいたまなども政令市）"},
      {"u": "shakai", "q": "北海道地方でただ1つの政令指定都市はどこ？", "a": "札幌市"},
      {"u": "shakai", "q": "次の地図記号は、何を表す？", "a": "発電所", "f": "denryoku"},
      {"u": "shakai", "q": "次の地図記号は、何を表す？", "a": "警察署", "f": "keisatsu"},
      {"u": "shakai", "q": "2万5千分の1の地形図で、地図上2cmは実際何m？（1cmは2万5千cm＝250m）", "a": "500m", "e": "2×250m＝500m。"}
    ]}
  ]},
  naoshi_ya:{ label:"週テスト直し（YA）", kai:[
    { id:"16", title:"16回 週テスト直し", units:{ kokugo:{ name:"国語", icon:"📖", color:"#E0699A" }, rika:{ name:"理科", icon:"🔬", color:"#16A398" }, shakai:{ name:"社会", icon:"🌏", color:"#5B6BC0" } }, questions:[
      {"u": "kokugo", "q": "「四谷監督は練習がキビシイことで有名だ。」の――のカタカナを漢字にすると？", "a": "厳しい", "e": "「きびしい」。少しの手ぬきも許さない様子。"},
      {"u": "kokugo", "q": "「日本では国民がシュケンを持っている。」の――のカタカナを漢字にすると？", "a": "主権", "e": "「しゅけん」。国の政治のあり方を最終的に決める力。"},
      {"u": "kokugo", "q": "「駅で夜行バスのジョウシャケンを買った。」の――のカタカナを漢字にすると？", "a": "乗車券", "e": "「じょうしゃけん」。電車やバスに乗る切符。"},
      {"u": "kokugo", "q": "「なめらかな手ざわりのキヌイト。」の――のカタカナを漢字にすると？", "a": "絹糸", "e": "「きぬいと」。蚕（かいこ）のまゆからとった糸。"},
      {"u": "kokugo", "q": "「大塚さんはチキを頼って上京した。」の――のカタカナを漢字にすると？", "a": "知己", "e": "「ちき」。よく知り合った人。親友・知人。"},
      {"u": "kokugo", "q": "「この一週間は気温の変化がハゲシイ。」の――のカタカナを漢字にすると？", "a": "激しい", "e": "「はげしい」。程度が非常に強い。"},
      {"u": "kokugo", "q": "「日本国ケンポウの理念について学ぶ。」の――のカタカナを漢字にすると？", "a": "憲法", "e": "「けんぽう」。国の最高のきまり。"},
      {"u": "kokugo", "q": "「アナバの店があれば教えてほしい。」の――のカタカナを漢字にすると？", "a": "穴場", "e": "「あなば」。あまり知られていないよい場所。"},
      {"u": "kokugo", "q": "「深コキュウをして気持ちを落ち着ける。」の――のカタカナを漢字にすると？", "a": "呼吸", "e": "「こきゅう」。息をすう・はくこと。"},
      {"u": "kokugo", "q": "「この地域は鉱物シゲンに恵まれている。」の――のカタカナを漢字にすると？", "a": "資源", "e": "「しげん」。産業のもとになる自然の材料。"},
      {"u": "kokugo", "q": "「ケイアイする作家の本を読む。」の――のカタカナを漢字にすると？", "a": "敬愛", "e": "「けいあい」。うやまい親しむこと。"},
      {"u": "kokugo", "q": "「シェイクスピアのヒゲキを読む。」の――のカタカナを漢字にすると？", "a": "悲劇", "e": "「ひげき」。悲しい結末の劇・できごと。"},
      {"u": "kokugo", "q": "「ボウキョウの念にかられる。」の――のカタカナを漢字にすると？", "a": "望郷", "e": "「ぼうきょう」。ふるさとをなつかしむ気持ち。"},
      {"u": "kokugo", "q": "「自動車会社にツトメル。」の――のカタカナを漢字にすると？", "a": "勤める", "e": "「つとめる」。会社などで働く。※務める・努めると区別。"},
      {"u": "kokugo", "q": "「王様のケイゴをする。」の――のカタカナを漢字にすると？", "a": "警護", "e": "「けいご」。危険がないよう守ること。※敬語と区別。"},
      {"u": "kokugo", "q": "演説会に集まる人の数は、政治家への期待の高さをはかる◯◯だ。（意味：程度をはかる目安）", "a": "バロメーター", "e": "程度をはかる目安。"},
      {"u": "kokugo", "q": "あの人は裏切り者だという◯◯を貼られてしまった。（意味：一方的な決めつけ）", "a": "レッテル", "e": "決めつけた評価。"},
      {"u": "kokugo", "q": "商品の値段が決まる◯◯を研究する。（意味：仕組み・機構）", "a": "メカニズム", "e": "仕組み・機構。"},
      {"u": "kokugo", "q": "その政策に賛成という◯◯で記事を書く。（意味：立場・態度）", "a": "スタンス", "e": "立場・態度。"},
      {"u": "kokugo", "q": "審判の判定に◯◯をつける。（意味：苦情・異議）", "a": "クレーム", "e": "苦情・異議。"},
      {"u": "rika", "q": "水と置きかえて気体を集める「水上置換法」で、気体を集める集気びんの中には、あらかじめ何を入れておく？", "a": "水（いっぱいに満たしておく）", "e": "水にとけにくい気体を集める方法。"},
      {"u": "rika", "q": "次の気体を集める方法は？(1)塩化水素〔空気より重く水にとけやすい〕(2)水素〔水にとけにくい〕(3)アンモニア〔空気より軽く水にとけやすい〕", "a": "(1)下方置換法 (2)水上置換法 (3)上方置換法"},
      {"u": "rika", "q": "アルミニウムにうすい塩酸を加えると発生する気体は？また、塩酸のかわりに使える水よう液は？", "a": "水素／水酸化ナトリウム水よう液"},
      {"u": "rika", "q": "(1)二酸化炭素を発生させるには、どんな固体に何を加える？(2)酸素を発生させるには、どんな固体に何を加える？", "a": "(1)石灰石（炭酸カルシウム）にうすい塩酸 (2)二酸化マンガンにうすい過酸化水素水（オキシドール）"},
      {"u": "rika", "q": "二酸化マンガンは、過酸化水素水を分解して酸素を発生させるが、自分自身は変化しない。このようなはたらきをする物質を何という？", "a": "触媒（しょくばい）"},
      {"u": "rika", "q": "丸底フラスコにアンモニアを集め、スポイトで少量の水を入れると、ビーカーの水が吸い上げられて噴水になる。(1)水が吸い上げられる理由は？(2)フェノールフタレイン液を加えた水は何色になる？", "a": "(1)アンモニアが水に大量にとけてフラスコ内の気体が減り、気圧が下がるから (2)赤色（アルカリ性）"},
      {"u": "rika", "q": "夕方に東の空からのぼり、真夜中に南の空を通り、明け方に西の空へしずんでいく月は、どんな形（満ち欠け）の月？", "a": "満月"},
      {"u": "rika", "q": "ある日、月の出が午後11時35分、次の日の月の入りが午前11時38分だった。この月が空に出ていた時間は？", "a": "12時間3分"},
      {"u": "rika", "q": "太陽・地球・月がこの順に一直線にならび、月が地球のかげに入って起こる現象を何という？また満月・新月どちらのとき起こる？", "a": "月食／満月のとき", "e": "月は東側から欠け始める。"},
      {"u": "shakai", "q": "神奈川県にあり、東京湾の入り口に面し、先に三崎港がある半島を何という？", "a": "三浦半島"},
      {"u": "shakai", "q": "千葉県の東京湾岸に残る、貴重な干潟を2つ答えると？", "a": "三番瀬・谷津干潟", "e": "（茨城県の霞ヶ浦は東京湾ではない）"},
      {"u": "shakai", "q": "群馬・栃木・茨城などの内陸に広がり、高速道路ぞいに電気機械などの工場が進出した工業地域を何という？", "a": "関東内陸工業地域", "f": "chart_nairiku"},
      {"u": "shakai", "q": "現在、日本で貿易額が最も多い「貿易港」は、船の港ではなく空港である。その空港の名前は？", "a": "成田国際空港"},
      {"u": "shakai", "q": "横浜港の輸入品で、金額が最も多いもの（2023年）は？", "a": "液化ガス"},
      {"u": "shakai", "q": "みなとみらい21がある、神奈川県の貿易港を漢字で答えると？", "a": "横浜（港）"},
      {"u": "shakai", "q": "栃木県の日光にある、湖面の高さ（標高）が日本一高い湖を何という？", "a": "中禅寺湖"},
      {"u": "shakai", "q": "こんにゃくいもの生産量が全国の9割以上をしめる下仁田町があるのは何県？", "a": "群馬県"},
      {"u": "shakai", "q": "富岡製糸場（世界遺産）があるのは何県？", "a": "群馬県"},
      {"u": "shakai", "q": "群馬県の県庁所在地で、利根川の上流が流れる都市はどこ？", "a": "前橋市"},
      {"u": "shakai", "q": "千葉県の太平洋側にあり、水あげ量が日本有数の漁港はどこ？", "a": "銚子（港）"},
      {"u": "shakai", "q": "大都市で、都心の人口が減り、周りの郊外の人口が増えていく現象を何という？", "a": "ドーナツ化現象"},

      {"u": "shakai", "q": "長野県の八ヶ岳のふもとの野辺山原などで、夏のすずしさを生かして作られる高原野菜は？", "a": "レタス（高原野菜）"},
      {"u": "shakai", "q": "新潟・富山・長野・岐阜県に広がる、日本アルプスの一つの山脈を何という？", "a": "飛驒山脈"},
      {"u": "shakai", "q": "愛知県で、鉄鋼業（製鉄）がさかんな臨海の都市はどこ？", "a": "東海市"},
      {"u": "shakai", "q": "北陸新幹線の、金沢から先へ延びた区間の終着駅（福井県）はどこ？", "a": "敦賀（駅）"},

const SUBJECT_ORDER=['shakai','rika','kokugo','naoshi_ru','naoshi_ya'];

const mem={};
const store={get(k){try{return localStorage.getItem(k)}catch(e){return (k in mem)?mem[k]:null}},set(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}};
let checked=new Set();
(function(){try{const r=store.get('checkedAll');if(r)checked=new Set(JSON.parse(r));}catch(e){}})();
function saveChecked(){store.set('checkedAll',JSON.stringify([...checked]));}
function keyOf(c){return curSubject+'|'+curKaiId+'|'+c.q;}
function kaiObj(){return DATA[curSubject].kai.find(k=>k.id===curKaiId);}
function unitsOf(){return kaiObj().units;}
function questionsOf(){return kaiObj().questions;}
function unitCards(u){return questionsOf().filter(c=>c.u===u);}
function checkedCards(){return questionsOf().filter(c=>checked.has(keyOf(c)));}
function showScreen(id){['subjectScreen','kaiScreen','unitScreen','quizScreen','resultScreen','collectionScreen'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));var ap=document.querySelector('.app');if(ap){ap.scrollTop=0;}}
function buildSubjects(){
  const wrap=document.getElementById('subjectGrid');wrap.innerHTML='';
  SUBJECT_ORDER.forEach(sk=>{
    const s=DATA[sk],n=s.kai.length;
    const b=document.createElement('button');b.className='subject-card '+sk;b.onclick=()=>chooseSubject(sk);
    const icon={shakai:'🌏',rika:'🔬',kokugo:'📖',naoshi_ru:'✏️',naoshi_ya:'🖊️'}[sk]||'📚';
    b.innerHTML='<div class="ico">'+icon+'</div><div class="nm">'+s.label+'</div><div class="cnt">'+(n>0?('第'+s.kai[0].id+'回〜（'+n+'回）'):'準備中')+'</div>';
    if(n===0)b.classList.add('inactive');
    wrap.appendChild(b);
  });
  showScreen('subjectScreen');
}
function chooseSubject(sk){if(DATA[sk].kai.length===0){alert('「'+DATA[sk].label+'」は まだ ありません。これから 追加していきます。');return;}curSubject=sk;buildKai();}
function buildKai(){
  document.getElementById('kaiTitle').textContent=DATA[curSubject].label+'　回をえらぶ';
  const wrap=document.getElementById('kaiGrid');wrap.innerHTML='';
  DATA[curSubject].kai.forEach(k=>{
    const b=document.createElement('button');b.className='kai-card';b.onclick=()=>chooseKai(k.id);
    b.innerHTML='<div class="kai-no">第'+k.id+'回</div><div class="kai-ttl">'+k.title+'</div><div class="cnt">'+k.questions.length+'もん</div>';
    wrap.appendChild(b);
  });
  showScreen('kaiScreen');
}
function chooseKai(id){curKaiId=id;buildUnits();}
function buildUnits(){
  const k=kaiObj();
  document.getElementById('unitTitle').textContent='第'+k.id+'回　'+k.title;
  const grid=document.getElementById('unitGrid');grid.innerHTML='';
  Object.keys(k.units).forEach(u=>{
    const info=k.units[u];
    const b=document.createElement('button');b.className='unit';b.style.borderLeftColor=info.color;b.onclick=()=>start(u);
    b.innerHTML='<div class="ico">'+info.icon+'</div><div><div class="nm">'+info.name+'</div><div class="cnt">'+unitCards(u).length+'もん</div></div>';
    grid.appendChild(b);
  });
  const all=document.createElement('button');all.className='unit all';all.onclick=()=>start('all');
  all.innerHTML='<div class="ico">📚</div><div><div class="nm">ぜんぶ（'+k.questions.length+'もん）</div></div>';
  grid.appendChild(all);
  refreshChecked();showScreen('unitScreen');
}
function refreshChecked(){
  const n=checkedCards().length,card=document.getElementById('checkedCard'),clr=document.getElementById('clearBtn');
  if(n>0){document.getElementById('cnt-checked').textContent=n+'もん を くりかえし練習';card.classList.remove('inactive');clr.classList.remove('hidden');}
  else{document.getElementById('cnt-checked').textContent='問題に🚩を つけると ここに たまります';card.classList.add('inactive');clr.classList.add('hidden');}
}
function toggleShuffle(){shuffleOn=!shuffleOn;document.getElementById('shuffleToggle').classList.toggle('on',shuffleOn);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function start(u){
  let cards;
  if(u==='all')cards=questionsOf().slice();
  else if(u==='checked'){cards=checkedCards();if(cards.length===0)return;}
  else cards=unitCards(u);
  curUnit=u;curDeckFull=!(u==='all'||u==='checked');deck=shuffleOn?shuffle(cards):cards.slice();beginDeck();
}
function beginDeck(){idx=0;okCount=0;wrongCards=[];showScreen('quizScreen');renderCard();}
function renderCard(){
  const c=deck[idx],info=unitsOf()[c.u];
  document.getElementById('qcount').textContent=(idx+1)+' / '+deck.length+'もん';
  document.getElementById('okcount').textContent='できた '+okCount;
  document.getElementById('barFill').style.width=(idx/deck.length*100)+'%';
  document.getElementById('barFill').style.background=info.color;
  const tag=document.getElementById('qtag');tag.textContent=info.name;tag.style.background=info.color;
  const fg=document.getElementById('qfig');
  if(c.f&&FIGS[c.f]){fg.innerHTML=FIGS[c.f];fg.classList.remove('hidden');}else{fg.innerHTML='';fg.classList.add('hidden');}
  document.getElementById('qtext').textContent=c.q;
  document.getElementById('atext').textContent=c.a;
  var _ax=document.getElementById('aexpl');if(c.e){_ax.textContent=c.e;_ax.classList.remove('hidden');}else{_ax.textContent='';_ax.classList.add('hidden');}
  updateCheckBtn();
  document.getElementById('answerBox').classList.add('hidden');
  document.getElementById('judgeBox').classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');
}
function updateCheckBtn(){const on=checked.has(keyOf(deck[idx]));document.getElementById('checkBtn').classList.toggle('on',on);document.getElementById('checkLabel').textContent=on?'チェック中':'チェック';}
function toggleCheck(){const k=keyOf(deck[idx]);if(checked.has(k))checked.delete(k);else checked.add(k);saveChecked();updateCheckBtn();}
function reveal(){document.getElementById('answerBox').classList.remove('hidden');document.getElementById('revealBtn').classList.add('hidden');document.getElementById('judgeBox').classList.remove('hidden');}
function mark(correct){if(correct)okCount++;else wrongCards.push(deck[idx]);idx++;if(idx>=deck.length)finish();else renderCard();}
function finish(){
  showScreen('resultScreen');
  const total=deck.length,pct=Math.round(okCount/total*100);
  document.getElementById('rNum').textContent=okCount;document.getElementById('rTotal').textContent=total;
  let face='🎉',title='よくがんばりました！',msg='';
  if(pct===100){face='🏆';title='ぜんもん せいかい！';msg='かんぺき！ この調子でつづけよう。';}
  else if(pct>=70){face='😃';title='あと すこし！';msg='まちがえた問題を もう一度やって 完ぺきにしよう。';}
  else{face='💪';title='ここから のびる！';msg='くりかえせば 必ず おぼえられます。もう一度 チャレンジ！';}
  document.getElementById('rFace').textContent=face;document.getElementById('rTitle').textContent=title;document.getElementById('rMsg').textContent=msg;
  document.getElementById('retryBtn').classList.toggle('hidden',wrongCards.length===0);
  onUnitFinish();
}
function retryWrong(){curDeckFull=false;deck=shuffleOn?shuffle(wrongCards):wrongCards.slice();beginDeck();}
function restartSame(){start(curUnit);}

function pickUnowned(rar){
  const pool=ITEMS.filter(it=>it.r===rar && !owned.has(it.id));
  if(!pool.length)return null;
  return pool[Math.floor(Math.random()*pool.length)];
}
function doGacha(guaranteed){
  const force = guaranteed || (pity>=9);
  let rar;
  if(force){ rar = (Math.random()<0.8)?'SR':'LEGEND'; }
  else { const x=Math.random()*100; rar = x<3?'LEGEND':(x<15?'SR':(x<40?'R':'N')); }
  let item=pickUnowned(rar);
  if(!item){ for(const rr of ['LEGEND','SR','R','N']){ item=pickUnowned(rr); if(item){rar=rr;break;} } }
  if(!item) return null;
  owned.add(item.id); newIds.add(item.id);
  if(rar==='SR'||rar==='LEGEND') pity=0; else pity++;
  saveItems();
  return {item,rar};
}

  const pg=document.getElementById('packGet'),rn=document.getElementById('repeatNote'),mn=document.getElementById('mileNote');
  pg.classList.add('hidden'); rn.classList.add('hidden'); mn.classList.add('hidden'); pendingPack=null;
  if(!(curDeckFull && wrongCards.length===0 && awardableUnit())) return;
  const key=curSubject+'|'+curKaiId+'|'+curUnit;
  const first=!cleared.has(key);
  clearCnt[key]=(clearCnt[key]||0)+1; cleared.add(key); saveItems();
  const newTrophies=checkMilestones();
  if(newTrophies.length){ mn.innerHTML=newTrophies.map(t=>'<div class="mile">'+t.e+' '+t.n+'</div>').join(''); mn.classList.remove('hidden'); }
  if(first){
    const isNaoshi=(curSubject==='naoshi_ru'||curSubject==='naoshi_ya');
    pendingPack={guaranteed:isNaoshi};
    document.getElementById('pgHint').textContent=isNaoshi?'週テスト直しクリア！ SR以上かくてい✨':'ぜんもんノーミス クリア報酬！';
    pg.classList.remove('hidden');
  } else {
    rn.textContent='この単元は クリアずみ（★'+clearCnt[key]+'回）。アイテムは 初回クリアだけ もらえます。';
    rn.classList.remove('hidden');
  }
}
function checkMilestones(){
  const earned=[];
  const have=new Set(trophies.map(t=>t.id));
  // 回コンプ
  for(const sk of SUBJECT_ORDER){ const s=DATA[sk]; if(!s||!s.kai)continue;
    s.kai.forEach(k=>{ const us=Object.keys(k.units||{}).filter(u=>(k.questions||[]).some(q=>q.u===u));
      if(!us.length)return;
      const all=us.every(u=>cleared.has(sk+'|'+k.id+'|'+u));
      const id='kai:'+sk+':'+k.id;
      if(all && !have.has(id)){ const t={id,e:'🏆',n:(s.label)+' '+k.id+'回 制覇トロフィー'}; trophies.push(t); earned.push(t); }
    });
  }
  // 収集数メダル
  [[10,'🥉','コレクター銅メダル（10個）'],[30,'🥈','コレクター銀メダル（30個）'],[50,'🥇','コレクター金メダル（50個）']].forEach(m=>{
    const id='cnt:'+m[0]; if(owned.size>=m[0] && !have.has(id)){ const t={id,e:m[1],n:m[2]}; trophies.push(t); earned.push(t); }
  });
  if(earned.length) saveItems();
  return earned;
}
/* ---- ガチャ演出 ---- */
function openPack(){
  if(!pendingPack)return;
  const g=pendingPack.guaranteed; pendingPack=null;
  document.getElementById('packGet').classList.add('hidden');
  const res=doGacha(g);
  const ov=document.getElementById('gachaOverlay');
  const pack=document.getElementById('gachaPack'),card=document.getElementById('gachaCard'),cl=document.getElementById('gachaClose');
  card.classList.add('hidden'); cl.classList.add('hidden'); pack.classList.remove('hidden');
  ov.classList.remove('hidden');
  ov._res=res;
}
function revealGacha(){
  const ov=document.getElementById('gachaOverlay');
  const res=ov._res;
  const pack=document.getElementById('gachaPack'),card=document.getElementById('gachaCard'),cl=document.getElementById('gachaClose');
  pack.classList.add('hidden');
  if(!res){ card.className='gcard'; card.innerHTML='<div class="gc-in"><div class="gc-em">🎉</div><div class="gc-nm">ぜんぶ集めた！</div><div class="gc-r">コンプリート</div></div>'; }
  else{ const {item,rar}=res; card.className='gcard '+RARITY[rar].cls;
    card.innerHTML='<div class="gc-in"><div class="gc-r-lbl">'+RARITY[rar].label+'</div><div class="gc-em">'+item.e+'</div><div class="gc-nm">'+item.n+'</div><div class="gc-cat">'+item.c+'</div><div class="gc-new">NEW!</div></div>'; }
  card.classList.remove('hidden');
  cl.classList.remove('hidden');
}
function closeGacha(){ document.getElementById('gachaOverlay').classList.add('hidden'); }
/* ---- コレクション（図鑑）---- */
let collFilter='all';
function openCollection(){ collFilter='all'; renderCollection(); showScreen('collectionScreen'); }
function collClose(){ newIds.clear(); saveItems(); buildSubjects(); }
function setCollFilter(f){ collFilter=f; renderCollection(); }
function renderCollection(){
  const total=ITEMS.length, got=owned.size, pct=Math.round(got/total*100);
  document.getElementById('collPct').textContent=pct+'%';
  document.getElementById('collCnt').textContent=got+' / '+total;
  document.getElementById('collBar').style.width=pct+'%';
  // filter chips active state
  document.querySelectorAll('#collFilters .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.f===collFilter));
  const list=ITEMS.filter(it=>collFilter==='all'||it.r===collFilter);
  const grid=document.getElementById('collGrid');
  grid.innerHTML=list.map(it=>{
    const has=owned.has(it.id);
    if(!has) return '<div class="citem locked"><div class="ci-em">❓</div><div class="ci-nm">？？？</div></div>';
    const isnew=newIds.has(it.id);
    return '<div class="citem '+RARITY[it.r].cls+'">'+(isnew?'<div class="ci-new">NEW</div>':'')+'<div class="ci-em">'+it.e+'</div><div class="ci-nm">'+it.n+'</div><div class="ci-r">'+it.r+'</div></div>';
  }).join('');
  // trophies
  const tw=document.getElementById('collTrophies');
  if(trophies.length){ tw.innerHTML='<div class="coll-sub">🏆 トロフィー・メダル</div><div class="troph-row">'+trophies.map(t=>'<div class="troph">'+t.e+'<span>'+t.n+'</span></div>').join('')+'</div>'; }
  else{ tw.innerHTML='<div class="coll-sub">🏆 トロフィー・メダル</div><div class="troph-empty">まだありません。回の 全単元クリアや 収集数で もらえます。</div>'; }
}
function initItems(){ loadItems(); }

initItems();
buildSubjects();

</script>
